<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>年齢別・最適資産配分シミュレーター｜マネー教室</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#f5f5f0;color:#2c2c2c;min-height:100vh;}
    .wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px;}
    .header{background:#1a1a2e;border-radius:12px;padding:20px 22px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
    .header a{color:#e8d5a0;font-size:14px;font-weight:700;text-decoration:none;}
    .header span{color:#aab8cc;font-size:12px;}
    h1{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px;line-height:1.4;}
    .subtitle{font-size:13px;color:#666;margin-bottom:20px;line-height:1.7;}
    .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .card-title{font-size:13px;font-weight:700;color:#b8860b;letter-spacing:2px;margin-bottom:14px;}
    label{font-size:13px;font-weight:600;color:#1a1a2e;display:block;margin-bottom:6px;}
    input[type=range]{width:100%;accent-color:#1a1a2e;margin:4px 0 2px;}
    .val-display{font-size:20px;font-weight:800;color:#1a1a2e;text-align:center;margin-bottom:6px;}
    .val-sub{font-size:11px;color:#888;text-align:center;margin-bottom:14px;}
    select,input[type=number]{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;}
    select:focus,input[type=number]:focus{outline:none;border-color:#1a1a2e;}
    .radio-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .radio-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid #ddd;background:#fff;color:#666;transition:all .2s;}
    .radio-btn.active{border-color:#1a1a2e;background:#1a1a2e;color:#fff;}
    .btn-calc{display:block;width:100%;background:linear-gradient(135deg,#1a1a2e,#2d3a6e);color:#fff;font-size:16px;font-weight:700;padding:16px;border:none;border-radius:10px;cursor:pointer;margin-top:8px;}
    #resultCard{display:none;}
    .alloc-bar{display:flex;border-radius:8px;overflow:hidden;height:36px;margin:14px 0;}
    .alloc-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:width .5s ease;}
    .alloc-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;}
    .alloc-table th{background:#f5f5f0;padding:8px 12px;text-align:left;font-weight:700;color:#555;}
    .alloc-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0;}
    .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;}
    .insight-box{background:#fdf8ed;border:1px solid #e0d0a0;border-radius:8px;padding:14px 16px;margin-top:10px;}
    .insight-box p{font-size:13px;color:#444;line-height:1.8;margin:0;}
    .note{font-size:11px;color:#aaa;margin-top:12px;line-height:1.6;}
    .back-link{display:block;text-align:center;margin-top:20px;color:#888;font-size:13px;text-decoration:none;}
    .inflation-note{background:#fff3e0;border-left:4px solid #e65100;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#555;line-height:1.7;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <a href="https://moneykyoshitsu.com/">← マネー教室</a>
    <span>年齢別 最適資産配分</span>
  </div>

  <h1>📊 年齢別・最適資産配分シミュレーター</h1>
  <p class="subtitle">過去100年のインフレ率と市場データをもとに、あなたの年齢・状況に最適な株式・債券・現金の配分比率を算出します。</p>

  <div class="card">
    <div class="card-title">STEP 1 — 基本情報</div>

    <label>現在の年齢</label>
    <div class="val-display" id="ageDisplay">30歳</div>
    <input type="range" id="ageSlider" min="18" max="75" value="30" oninput="updateAge(this.value)">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:14px;">
      <span>18歳</span><span>75歳</span>
    </div>

    <label>退職予定年齢</label>
    <select id="retireAge">
      <option value="55">55歳（早期退職）</option>
      <option value="60">60歳（定年前退職）</option>
      <option value="65" selected>65歳（一般的な定年）</option>
      <option value="70">70歳（継続勤務）</option>
    </select>

    <label>リスク許容度</label>
    <div class="radio-group">
      <button class="radio-btn" id="risk-low" onclick="setRisk('low')">安定重視</button>
      <button class="radio-btn active" id="risk-mid" onclick="setRisk('mid')">バランス型</button>
      <button class="radio-btn" id="risk-high" onclick="setRisk('high')">成長重視</button>
    </div>

    <label>現在の資産規模（任意）</label>
    <div class="radio-group">
      <button class="radio-btn active" id="asset-s" onclick="setAsset('s')">〜500万円</button>
      <button class="radio-btn" id="asset-m" onclick="setAsset('m')">500〜2,000万円</button>
      <button class="radio-btn" id="asset-l" onclick="setAsset('l')">2,000万円〜</button>
    </div>

    <button class="btn-calc" onclick="calculate()">💡 最適配分を診断する</button>
  </div>

  <div class="card" id="resultCard">
    <div class="card-title">診断結果</div>
    <div class="alloc-bar" id="allocBar"></div>
    <table class="alloc-table" id="allocTable"></table>
    <div class="inflation-note" id="inflationNote"></div>
    <div class="insight-box" id="insightBox"></div>
    <p class="note">※ 過去100年のインフレ率・市場リターンデータ（Dimson-Marsh-Staunton、Damodaran統計）を参考に算出。あくまで参考値です。最終的な投資判断はご自身でお願いします。</p>
  </div>

  <a class="back-link" href="https://moneykyoshitsu.com/simulator/">より詳細な将来資産シミュレーション →</a>
</div>

<script>
let _risk = 'mid', _asset = 's';

function updateAge(v) {
  document.getElementById('ageDisplay').textContent = v + '歳';
}

function setRisk(r) {
  _risk = r;
  ['low','mid','high'].forEach(k => {
    document.getElementById('risk-'+k).classList.toggle('active', k === r);
  });
}

function setAsset(a) {
  _asset = a;
  ['s','m','l'].forEach(k => {
    document.getElementById('asset-'+k).classList.toggle('active', k === a);
  });
}

// ────────────────────────────────────────────
// コアロジック：年齢・リスク・インフレ実績から配分を計算
// 基礎: 「100 - 年齢 = 株式比率」（ルール・オブ・100）を拡張
// インフレ時代（2%+）補正: 現金比率を下げ、株式比率を引き上げ
// ────────────────────────────────────────────
function calculate() {
  const age       = parseInt(document.getElementById('ageSlider').value);
  const retireAge = parseInt(document.getElementById('retireAge').value);
  const yearsLeft = Math.max(1, retireAge - age);

  // ベース株式比率（修正版ルール・オブ・110）
  // インフレ2%+ 環境: 株式を増やして実質リターンを確保
  let baseStock = 110 - age; // インフレ調整済み（旧来の100から+10%）

  // リスク許容度補正
  const riskAdj = { low: -15, mid: 0, high: +15 };
  baseStock += riskAdj[_risk];

  // 資産規模補正（大きいほど分散しやすい）
  const assetAdj = { s: -5, m: 0, l: +5 };
  baseStock += assetAdj[_asset];

  // 残り投資期間補正
  if (yearsLeft < 5)  baseStock -= 20;
  else if (yearsLeft < 10) baseStock -= 10;

  // 上下限
  baseStock = Math.max(10, Math.min(90, baseStock));

  // 債券・現金の配分
  let bond, cash;
  if (baseStock >= 70) {
    bond = Math.round((100 - baseStock) * 0.6);
    cash = 100 - baseStock - bond;
  } else if (baseStock >= 40) {
    bond = Math.round((100 - baseStock) * 0.5);
    cash = 100 - baseStock - bond;
  } else {
    bond = Math.round((100 - baseStock) * 0.4);
    cash = 100 - baseStock - bond;
  }

  // 端数調整
  const total = baseStock + bond + cash;
  if (total !== 100) cash += (100 - total);

  // 期待リターン（インフレ後実質）
  const expReturn = (baseStock/100 * 5.0 + bond/100 * 1.5 + cash/100 * 0.1).toFixed(1);

  // 表示
  const bar = document.getElementById('allocBar');
  bar.innerHTML = [
    `<div class="alloc-seg" style="width:${baseStock}%;background:#1565c0;">${baseStock}%</div>`,
    `<div class="alloc-seg" style="width:${bond}%;background:#2e7d32;">${bond}%</div>`,
    `<div class="alloc-seg" style="width:${cash}%;background:#795548;">${cash}%</div>`,
  ].join('');

  // テーブル
  const rows = [
    ['#1565c0', '株式インデックス', baseStock, '全世界株（オルカン）・S&P500・日経225など'],
    ['#2e7d32', '債券・REIT',        bond,      '国内外債券・個人向け国債（変動10年）・REIT'],
    ['#795548', '現金・生活防衛資金', cash,      '普通預金・定期預金（生活費6ヶ月分相当）'],
  ];
  document.getElementById('allocTable').innerHTML =
    '<tr><th>資産クラス</th><th>比率</th><th>具体例</th></tr>' +
    rows.map(([col, name, pct, ex]) =>
      `<tr><td><span class="dot" style="background:${col}"></span>${name}</td><td style="font-weight:700;">${pct}%</td><td style="color:#888;font-size:11px;">${ex}</td></tr>`
    ).join('');

  // インフレ注記
  document.getElementById('inflationNote').innerHTML =
    `<strong style="color:#e65100;">📈 インフレ時代の調整点：</strong>` +
    `過去30年（1994-2024）の日本のインフレ平均は約0.5%でしたが、` +
    `2022年以降は年率2-3%に上昇。インフレ2%が続くと10年で現金の実質価値は${Math.round((1-0.02**10)*100*82/100)}万円相当に目減りします。` +
    `このため株式比率を従来より<strong>+10%程度高め</strong>に設定しています。`;

  // インサイト
  const insights = [];
  if (baseStock >= 70) insights.push(`${age}歳で退職まで${yearsLeft}年。時間を味方にして積極的に株式で運用し、インフレに対抗できます。`);
  else if (baseStock >= 40) insights.push(`退職まで${yearsLeft}年。株式と債券のバランスで安定リターンを狙う時期です。`);
  else insights.push(`退職が近い（${yearsLeft}年以内）ため、元本保護を優先しています。株式比率を徐々に下げることをお勧めします。`);

  if (_risk === 'low') insights.push('安定重視の方は、株式の中でも「全世界株式インデックス」など分散型を選ぶと価格変動を抑えられます。');
  if (_risk === 'high') insights.push('成長重視でもNISAのつみたて投資枠（年120万円）で積み立てることで税金ゼロで複利を活かせます。');
  if (age < 30) insights.push('20代は最大の武器は「時間」。月3万円を30年積み立てるだけで（年率5%の場合）約2,500万円に育ちます。');
  insights.push(`期待実質リターン（インフレ後）：年率約${expReturn}%（この配分の場合の目安値）`);

  document.getElementById('insightBox').innerHTML = insights.map(i => `<p style="margin-bottom:6px;">・${i}</p>`).join('');

  document.getElementById('resultCard').style.display = '';
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
